# 仅为待填写的评价器配置；本仓库不提供启动脚本。
schema_version: "1.0"
evaluator: "wavlm"
evaluator_id: "microsoft/wavlm-base-sv"
evaluator_version: "填写检查点修订号"
checkpoint_path: "wavlm/models/microsoft--wavlm-base-sv"

input_contract:
  sample_rate_hz: 16000
  channels: 1
  preprocessing_id: "mono-16khz-v1-no-trim"
  trim_silence: false

embedding:
  pooling: "使用所选说话人验证检查点的默认聚合方式"
  score: "cosine_similarity"

calibration:
  positive_pair_manifest: "tts-bench/manifests/wavlm-positive-calibration.jsonl"
  negative_pair_manifest: "tts-bench/manifests/wavlm-negative-calibration.jsonl"

output:
  record_path: "wavlm/outputs/<run_id>/similarity.jsonl"
